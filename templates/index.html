<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Startup Profit Intelligence</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0b1220;
font-family:Segoe UI;
color:white;
}

.main-container{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card-box{

background:#020617;
padding:40px;
border-radius:14px;
width:420px;

box-shadow:0px 12px 35px rgba(0,0,0,0.5);
}

.title{
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:30px;
}

label{
margin-top:10px;
font-weight:500;
}

.form-control{
background:#0b1220;
color:white;
border:1px solid #1e293b;
}

.form-control:focus{
background:#0b1220;
color:white;
border:1px solid #2563eb;
box-shadow:none;
}

.predict-btn{

margin-top:25px;
width:100%;
background:#2563eb;
border:none;
font-weight:bold;
padding:10px;

}

.predict-btn:hover{
background:#1d4ed8;
}

.result-box{

margin-top:30px;
background:#022c22;
padding:18px;
border-radius:10px;

font-size:22px;
text-align:center;
color:#22c55e;

}

.footer{

text-align:center;
margin-top:20px;
color:#64748b;
font-size:12px;

}

</style>

</head>

<body>

<div class="main-container">

<div class="card-box">

<div class="title">Startup Profit Prediction</div>

<div class="subtitle">
Predict profit using Machine Learning
</div>

<form method="POST">

<label>R&D Spend</label>
<input type="number" name="rd" class="form-control" required>

<label>Administration Spend</label>
<input type="number" name="admin" class="form-control" required>

<label>Marketing Spend</label>
<input type="number" name="marketing" class="form-control" required>

<button class="btn predict-btn">
Predict Profit
</button>

</form>

{% if profit %}
<div class="result-box">
Predicted Profit : ₹ {{ profit }}
</div>
{% endif %}

<div class="footer">
© 2026 ProfitIQ | ML Prediction Tool
</div>

</div>

</div>

</body>
</html>
